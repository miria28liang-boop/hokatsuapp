*{box-sizing:border-box;margin:0;padding:0;}
:root{--ink:#2a1f14;--ink2:#5a4a3a;--ink3:#8a7a6a;--paper:#faf6f0;--paper2:#f3ede3;--paper3:#e8dfd2;--accent:#c0624a;--a2:#7a9e7e;--a3:#d4a853;--border:rgba(90,74,58,0.2);--sh:0 2px 12px rgba(42,31,20,0.08);}

.sc-c{background:var(--paper2);color:var(--ink3);}

.toast.show{opacity:1;}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--ink3);font-size:13px;line-height:2.2;}

  {gid:6,date:'2026-04-14',time:'10:00'},{gid:10,date:'2026-04-14',time:'15:00'},

window.signInWithGoogle=async function(){

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-app').style.display='block';
    document.getElementById('user-name').textContent=user.displayName||user.email;
    initDB();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('main-app').style.display='none';
  }
});

function initDB(){
  const recsRef=ref(db,'records');
  const schedsRef=ref(db,'schedules');
  const tasksRef=ref(db,'tasks');
  onValue(recsRef,(snap)=>{
    recs=snap.val()||{};
    if(document.getElementById('view-list').classList.contains('active'))renderList();
    if(document.getElementById('view-aim').classList.contains('active'))renderAim();
    if(document.getElementById('view-tasks').classList.contains('active'))renderTasks();
    setSyncOk();
  });
  onValue(schedsRef,(snap)=>{
    const val=snap.val();
    if(!val){const init={};MASTER_SCHEDS.forEach(s=>{init['g'+s.gid]=s;});set(schedsRef,init);}
    else{scheds=val;}
    if(document.getElementById('view-schedule').classList.contains('active'))renderSchedule();
    if(document.getElementById('view-tasks').classList.contains('active'))renderTasks();
    setSyncOk();dbReady=true;
    if(document.getElementById('view-list').classList.contains('active'))renderList();
  });
  onValue(tasksRef,(snap)=>{
    taskDone=snap.val()||{};
    if(document.getElementById('view-tasks').classList.contains('active'))renderTasks();
  });
}

function setSyncOk(){document.getElementById('sync-dot').className='sync-dot ok';document.getElementById('sync-label').textContent='同期中';}

function getRec(gid){return Object.values(recs).find(r=>r.gid===gid);}
function getSched(gid){return scheds['g'+gid]||null;}
function totalScore(r){if(!r)return null;const v=ALL.map(c=>r.na?.[c.key]?null:(r.scores?.[c.key]||0)).filter(x=>x!==null);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:null;}
function rnk(s){return s>=4.5?'S':s>=3.5?'A':s>=2.5?'B':'C';}

window.sw=function(tab){
  ['list','tasks','schedule','aim','add'].forEach((t,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',t===tab);
    document.getElementById('view-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='list')renderList();if(tab==='tasks')renderTasks();
  if(tab==='schedule')renderSchedule();if(tab==='aim')renderAim();if(tab==='add')buildAdd();
};

function renderList(){
  const el=document.getElementById('view-list');
  if(!dbReady){el.innerHTML='<div class="loading">読み込み中...</div>';return;}
  let gs=filt==='visited'?GM.filter(g=>getRec(g.id)):filt==='unvisited'?GM.filter(g=>!getRec(g.id)):GM;
  const vs=[...GM.filter(g=>getRec(g.id))].sort((a,b)=>(totalScore(getRec(b.id))||0)-(totalScore(getRec(a.id))||0));
  el.innerHTML=`<div class="filter-bar">
    <button class="fb ${filt==='all'?'on':''}" onclick="setF('all')">すべて</button>
    <button class="fb ${filt==='visited'?'on':''}" onclick="setF('visited')">見学済（${GM.filter(g=>getRec(g.id)).length}/${GM.length}）</button>
    <button class="fb ${filt==='unvisited'?'on':''}" onclick="setF('unvisited')">未見学</button>
  </div>`+gs.map(g=>{
    const rec=getRec(g.id);const ts=totalScore(rec);const rl=ts!==null?rnk(ts):null;
    const ri=vs.findIndex(x=>x.id===g.id);const sched=getSched(g.id);
    const rc=g.r0>=5?'#c0624a':g.r0>=2?'#d4a853':'#7a9e7e';
    return `<div class="gc ${!rec?'dim':''}" onclick="showDetail(${g.id})">
      <div class="sc ${rl?'sc-'+rl.toLowerCase():'sc-none'}">${rl||'—'}</div>
      <div class="ci">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;flex-wrap:wrap">
          <div class="cn">${g.name}</div>
          ${ri>=0&&ri<3?`<span class="tag t-ok">${ri+1}位</span>`:''}
          ${g.age==='×'?'<span class="tag t-ng">年齢×</span>':''}
          ${sched?`<span class="tag t-blue">${sched.date.slice(5).replace('-','/')} ${sched.time}</span>`:''}
          ${g.cs==='未'&&!sched?'<span class="tag t-amber">要予約</span>':''}
        </div>
        <div class="cm">${g.dist===0?'すぐ隣':g.dist+'m（'+g.walk+'分）'}　0歳定員${g.cap0}名　${ts!==null?'評価 '+ts+'/5':'未見学'}</div>
        <div class="rbar"><div class="rt"><div class="rf" style="width:${Math.min((g.r0||0)/15*100,100)}%;background:${rc}"></div></div></div>
        <div style="font-size:10px;color:var(--ink3);margin-top:1px">0歳倍率：${g.r0||'—'}倍</div>
      </div>
    </div>`;
  }).join('');
}
window.setF=function(f){filt=f;renderList();};

function renderTasks(){
  const el=document.getElementById('view-tasks');

  const all=[...nc.map(g=>'c'+g.id),...nr.map(g=>'r'+g.id),...nv.map(g=>'v'+g.id)];
  const done=all.filter(k=>taskDone[k]).length;
  el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <div style="font-size:13px;color:var(--ink2)">残タスク</div>
    <div style="flex:1;height:6px;background:var(--paper3);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--a2);border-radius:3px;width:${all.length?Math.round(done/all.length*100):0}%"></div></div>
    <div style="font-size:12px;color:var(--ink3)">${done}/${all.length}</div>
  </div>
  <div class="card"><h3>📞 見学申し込みが必要（${nc.length}園）</h3>
    ${nc.length?nc.map(g=>`<div class="task-item">
      <div class="task-check ${taskDone['c'+g.id]?'done':''}" onclick="toggleTask('c${g.id}')">${taskDone['c'+g.id]?'✓':''}</div>
      <div class="task-info"><div class="task-name ${taskDone['c'+g.id]?'done':''}">${g.name}</div>
      <div class="task-detail">${g.dist}m　Web：${g.wb==='○'?'予約可':'電話のみ'}　${g.note||''}</div></div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <button class="btn-s btn-xs" onclick="event.stopPropagation();openSched(${g.id})">日程を入れる</button>
        <a href="${g.url}" target="_blank" style="font-size:10px;color:var(--accent);text-decoration:none">公式↗</a>
      </div></div>`).join(''):`<div style="font-size:13px;color:var(--a2);padding:8px 0">すべて連絡済みです ✓</div>`}
  </div>
  <div class="card"><h3>⏳ 返信待ち（${nr.length}園）</h3>
    ${nr.length?nr.map(g=>`<div class="task-item">
      <div class="task-check ${taskDone['r'+g.id]?'done':''}" onclick="toggleTask('r${g.id}')">${taskDone['r'+g.id]?'✓':''}</div>
      <div class="task-info"><div class="task-name ${taskDone['r'+g.id]?'done':''}">${g.name}</div>
      <div class="task-detail">${g.vd}</div></div>
      <button class="btn-s btn-xs" onclick="event.stopPropagation();openSched(${g.id})">日程を入れる</button>
    </div>`).join(''):`<div style="font-size:13px;color:var(--a2);padding:8px 0">返信待ちはありません ✓</div>`}
  </div>
  <div class="card"><h3>📋 見学予定あり・記録未入力（${nv.length}園）</h3>
    ${nv.length?nv.map(g=>{const s=getSched(g.id);return `<div class="task-item">
      <div class="task-check ${taskDone['v'+g.id]?'done':''}" onclick="toggleTask('v${g.id}')">${taskDone['v'+g.id]?'✓':''}</div>
      <div class="task-info"><div class="task-name ${taskDone['v'+g.id]?'done':''}">${g.name}</div>
      <div class="task-detail">${s?s.date.slice(5).replace('-','/')+' '+s.time:'日程未定'}</div></div>
      <button class="btn-s btn-xs" onclick="event.stopPropagation();startAdd(${g.id})">記録を入力</button>
    </div>`;}).join(''):`<div style="font-size:13px;color:var(--a2);padding:8px 0">記録待ちはありません ✓</div>`}
  </div>`;
}
window.toggleTask=function(k){set(ref(db,'tasks/'+k),!taskDone[k]);};

function renderSchedule(){
  const el=document.getElementById('view-schedule');
  const list=Object.values(scheds).sort((a,b)=>a.date+a.time>b.date+b.time?1:-1);
  const today=new Date().toISOString().slice(0,10);
  const dows=['日','月','火','水','木','金','土'];
  function sh(items,label){
    if(!items.length)return '';
    return `<div class="card"><h3>${label}（${items.length}件）</h3>`+items.map(s=>{
      const g=GM.find(x=>x.id===s.gid);const rec=getRec(s.gid);
      const d=new Date(s.date+'T00:00:00');
      return `<div class="sched-item">
        <div class="sched-date"><div class="sched-day">${s.date.slice(5).replace('-','/')}</div><div class="sched-dow">${dows[d.getDay()]}曜　${s.time}</div></div>
        <div class="sched-info"><div class="sched-name">${g?g.name:'不明'}</div>${rec?`<div class="sched-note" style="color:var(--a2)">✓ 見学記録あり</div>`:''}</div>
        <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
          <button class="cal-btn" onclick="exportICS(${s.gid})">📅</button>
          <button class="btn-s btn-xs" onclick="editSched(${s.gid})">編集</button>
          <button class="btn-s btn-xs" style="color:#c0624a" onclick="delSched(${s.gid})">×</button>
        </div>
      </div>`;
    }).join('')+'</div>';
  }
  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-size:12px;color:var(--ink3)">${list.length}件登録</div>
    <button class="btn-p btn-xs" onclick="openSched(null)">＋ 日程を追加</button>
  </div>${sh(list.filter(s=>s.date>=today),'今後の見学')}${sh(list.filter(s=>s.date<today),'過去の見学')}`;
}

window.exportICS=function(gid){
  const s=getSched(gid);const g=GM.find(x=>x.id===gid);if(!s||!g)return;
  const dt=s.date.replace(/-/g,'');const[hh,mm]=s.time.split(':');
  const end=new Date(s.date+'T'+s.time);end.setHours(end.getHours()+1);
  const eh=(end.getHours()<10?'0':'')+end.getHours();
  const ics=`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//保育園見学ノート//\nBEGIN:VEVENT\nDTSTART;TZID=Asia/Tokyo:${dt}T${hh}${mm}00\nDTEND;TZID=Asia/Tokyo:${dt}T${eh}${mm}00\nSUMMARY:【見学】${g.name}\nDESCRIPTION:${g.addr}\\n${g.hours}\\n${g.url}\nLOCATION:${g.addr}\nEND:VEVENT\nEND:VCALENDAR`;
  const a=document.createElement('a');a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);a.download=`見学_${g.name}.ics`;a.click();
  showToast('カレンダーファイルを書き出しました');
};

window.openSched=function(gid){
  const s=gid?getSched(gid):null;
  document.getElementById('ov').innerHTML=`<div class="overlay" onclick="closeOv(event)">
    <div class="sheet" style="max-height:70vh"><h2>見学日程を登録</h2>
      <div class="field"><label>保育園</label><select id="ov-g" style="width:100%;padding:7px 10px;border:0.5px solid var(--border);border-radius:8px;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;background:var(--paper);outline:none;color:var(--ink);">
        ${GM.map(x=>`<option value="${x.id}" ${gid===x.id?'selected':''}>${x.name}</option>`).join('')}
      </select></div>
      <div class="two-col">
        <div class="field"><label>日付</label><input type="date" id="ov-date" value="${s?s.date:''}"></div>
        <div class="field"><label>時間</label><input type="time" id="ov-time" value="${s?s.time:''}"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn-p" onclick="saveSched()">保存</button>
        <button class="btn-s" onclick="closeOvDirect()">キャンセル</button>
      </div>
    </div>
  </div>`;
};
window.editSched=function(gid){openSched(gid);};
window.saveSched=function(){
  const gid=parseInt(document.getElementById('ov-g').value);
  const date=document.getElementById('ov-date').value;
  const time=document.getElementById('ov-time').value;
  if(!date){showToast('日付を入力してください');return;}
  set(ref(db,'schedules/g'+gid),{gid,date,time:time||'00:00'});
  closeOvDirect();showToast('日程を保存しました');
};
window.delSched=function(gid){if(!confirm('削除しますか？'))return;remove(ref(db,'schedules/g'+gid));showToast('削除しました');};

function aimScore(g){
  let rs=0;if(g.r0!==null){if(g.r0<=1)rs=20;else if(g.r0<=2)rs=18;else if(g.r0<=3)rs=14;else if(g.r0<=5)rs=9;else if(g.r0<=8)rs=4;else rs=1;}
  const ds=g.dist<=200?30:g.dist<=500?24:g.dist<=800?18:g.dist<=1000?10:5;
  const ts=totalScore(getRec(g.id));const es=ts!==null?Math.round(ts/5*50):0;
  return{total:rs+ds+es,rs,ds,es,hasEval:ts!==null};
}
function renderAim(){
  const el=document.getElementById('view-aim');
  const scored=GM.filter(g=>g.age!=='×').map(g=>({g,aim:aimScore(g)})).sort((a,b)=>b.aim.total-a.aim.total);
  el.innerHTML=`<div style="font-size:12px;color:var(--ink3);margin-bottom:12px;line-height:1.7">倍率（20点）＋距離（30点）＋見学評価（50点）の合計。見学前は評価0点。</div>`+
  scored.map(({g,aim},i)=>{
    const bg=i===0?'#fdf0e8':i===1?'var(--paper2)':i===2?'#edf5ee':'var(--paper2)';
    const tc=i===0?'var(--accent)':i===1?'var(--ink2)':i===2?'var(--a2)':'var(--ink3)';
    return `<div class="score-card">
      <div class="aim-score" style="background:${bg};color:${tc}">${i+1}</div>
      <div class="aim-bar-wrap">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="aim-name">${g.name}</div>
          <div style="font-size:13px;font-weight:500;color:${tc}">${aim.total}点</div>
        </div>
        <div class="aim-breakdown"><span>倍率：${aim.rs}点</span><span>距離：${aim.ds}点</span><span>評価：${aim.es}点${aim.hasEval?'':' (未)'}</span></div>
        <div class="aim-bar-track"><div class="aim-bar-fill" style="width:${aim.total}%;background:${i<3?'var(--accent)':'var(--ink3)'}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function buildAdd(){
  const sel=document.getElementById('f-g');
  if(sel.options.length<=1){GM.forEach(g=>{const o=document.createElement('option');o.value=g.id;o.textContent=g.name;sel.appendChild(o);});}
  buildEvalForm();
}
window.startAdd=function(gid){sw('add');setTimeout(()=>{document.getElementById('f-g').value=gid;onPickG();},50);};
window.onPickG=function(){
  const gid=parseInt(document.getElementById('f-g').value);const g=GM.find(x=>x.id===gid);
  const prev=document.getElementById('g-preview');
  if(!g){prev.style.display='none';return;}
  prev.style.display='block';
  prev.innerHTML=`<b>${g.name}</b>　${g.dist===0?'すぐ隣':g.dist+'m（'+g.walk+'分）'}<br>${g.addr}<br>開所：${g.hours}　0歳定員${g.cap0}名　0歳倍率${g.r0||'—'}倍`;
  const sched=getSched(gid);
  if(sched){document.getElementById('f-date').value=sched.date;document.getElementById('f-time').value=sched.time;}
  const rec=getRec(gid);
  if(rec){editId=rec.id;_sc={...rec.scores};_na={...rec.na||{}};_cm={...rec.comments||{}};document.getElementById('f-memo').value=rec.memo||'';buildEvalForm();}
  else{editId=null;_sc={};_na={};_cm={};}
};
function buildEvalForm(){
  const el=document.getElementById('eval-form');if(!el)return;
  el.innerHTML=GROUPS.map(gr=>`<div class="eval-group">
    <div class="eg-title" style="border-left-color:${gr.color};color:${gr.color}">${gr.label}</div>
    ${gr.items.map(c=>`<div class="sr"><div class="sl">${c.label}</div>
      <div class="sc-ctrl">
        <div class="stars" id="st-${c.key}">${[1,2,3,4,5].map(n=>`<div class="star ${n<=(_sc[c.key]||3)?'on':''}" onclick="setStar('${c.key}',${n})">★</div>`).join('')}</div>
        <button class="na-btn ${_na[c.key]?'on':''}" onclick="toggleNA('${c.key}')">N/A</button>
      </div>
      <div class="cf" style="${_na[c.key]?'display:none':''}"><input type="text" id="cm-${c.key}" placeholder="一言メモ" value="${_cm[c.key]||''}"></div>
    </div>`).join('')}
  </div>`).join('');
  ALL.forEach(c=>{if(!_sc[c.key])_sc[c.key]=3;});
}
window.setStar=function(k,n){_sc[k]=n;_na[k]=false;document.querySelectorAll(`#st-${k} .star`).forEach((s,i)=>s.classList.toggle('on',i<n));document.querySelector(`.na-btn[onclick="toggleNA('${k}')"]`).classList.remove('on');document.getElementById(`cm-${k}`)?.closest('.cf').style.removeProperty('display');};
window.toggleNA=function(k){_na[k]=!_na[k];document.querySelector(`.na-btn[onclick="toggleNA('${k}')"]`).classList.toggle('on',_na[k]);const cf=document.getElementById(`cm-${k}`)?.closest('.cf');if(cf)cf.style.display=_na[k]?'none':'';if(_na[k])document.querySelectorAll(`#st-${k} .star`).forEach(s=>s.classList.remove('on'));else document.querySelectorAll(`#st-${k} .star`).forEach((s,i)=>s.classList.toggle('on',i<(_sc[k]||3)));};
window.saveRec=function(){
  const gid=parseInt(document.getElementById('f-g').value);
  if(!gid){showToast('保育園を選んでください');return;}
  ALL.forEach(c=>{_cm[c.key]=document.getElementById(`cm-${c.key}`)?.value.trim()||'';});
  const entry={id:editId||Date.now(),gid,visit_date:document.getElementById('f-date').value,visit_time:document.getElementById('f-time').value,scores:{..._sc},na:{..._na},comments:{..._cm},memo:document.getElementById('f-memo').value.trim()};
  set(ref(db,'records/r'+entry.id),entry);
  clearF();showToast('保存しました！');sw('list');
};
window.clearF=function(){document.getElementById('f-g').value='';document.getElementById('f-date').value='';document.getElementById('f-time').value='';document.getElementById('f-memo').value='';document.getElementById('g-preview').style.display='none';editId=null;_sc={};_na={};_cm={};buildEvalForm();};

window.showDetail=function(gid){
  const g=GM.find(x=>x.id===gid);const rec=getRec(gid);const sched=getSched(gid);const ts=totalScore(rec);
  const evalHtml=rec?GROUPS.map(gr=>`<div style="margin-bottom:9px">
    <div class="dst" style="border-left-color:${gr.color};color:${gr.color}">${gr.label}</div>
    ${gr.items.map(c=>{const na=rec.na?.[c.key];return `<div class="er"><div class="el">${c.label}</div>
      <div class="es">${na?'<span style="font-size:10px;background:var(--paper3);padding:1px 5px;border-radius:3px">N/A</span>':`${'★'.repeat(rec.scores[c.key]||0)}${'☆'.repeat(5-(rec.scores[c.key]||0))}`}</div>
      ${rec.comments?.[c.key]?`<div class="ec">${rec.comments[c.key]}</div>`:''}</div>`;}).join('')}
  </div>`).join(''):'<div style="font-size:12px;color:var(--ink3);padding:6px 0">まだ見学記録がありません</div>';
  document.getElementById('ov').innerHTML=`<div class="overlay" onclick="closeOv(event)">
    <div class="sheet"><div style="display:flex;gap:8px;margin-bottom:.6rem">
      <div style="flex:1"><h2>${g.name}</h2><div style="font-size:11px;color:var(--ink3)">${g.addr}</div></div>
      ${g.age==='×'?'<span class="tag t-ng" style="flex-shrink:0">年齢条件×</span>':''}
    </div>
    <div class="ig">
      <div class="ii"><div class="il">距離</div><div class="iv">${g.dist===0?'すぐ隣':g.dist+'m（'+g.walk+'分）'}</div></div>
      <div class="ii"><div class="il">開所時間</div><div class="iv">${g.hours}</div></div>
      <div class="ii"><div class="il">0歳定員・倍率</div><div class="iv">${g.cap0}名・${g.r0||'—'}倍</div></div>
      <div class="ii"><div class="il">見学予定</div><div class="iv">${sched?sched.date.slice(5).replace('-','/')+' '+sched.time:'—'}</div></div>
    </div>
    ${g.note?`<div style="font-size:11px;color:var(--ink3);background:var(--paper2);border-radius:7px;padding:7px 10px;margin-bottom:9px">${g.note}</div>`:''}
    <a href="${g.url}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none">🔗 公式サイト↗</a>
    <div style="margin-top:10px">${evalHtml}</div>
    ${rec?.memo?`<div class="dst" style="border-left-color:var(--ink3);color:var(--ink3)">総合メモ</div><div class="memo-box">${rec.memo}</div>`:''}
    ${ts!==null?`<div style="font-size:12px;color:var(--ink2);margin-top:8px">総合スコア：<b>${ts}/5.0</b>（${rnk(ts)}ランク）</div>`:''}
    <div style="display:flex;gap:7px;margin-top:1rem;flex-wrap:wrap">
      <button class="btn-p btn-xs" onclick="startAdd(${gid});closeOvDirect()">見学記録を${rec?'編集':'追加'}</button>
      <button class="btn-s btn-xs" onclick="openSched(${gid});closeOvDirect()">日程を${sched?'編集':'登録'}</button>
      ${sched?`<button class="btn-s btn-xs" onclick="exportICS(${gid})">📅 カレンダー出力</button>`:''}
      ${rec?`<button class="btn-s btn-xs" style="color:#c0624a" onclick="delRec(${rec.id})">記録削除</button>`:''}
      <button class="btn-s btn-xs" onclick="closeOvDirect()">閉じる</button>
    </div>
  </div></div>`;
};
window.closeOv=function(e){if(e.target.classList.contains('overlay'))closeOvDirect();};
window.closeOvDirect=function(){document.getElementById('ov').innerHTML='';};
window.delRec=function(id){if(!confirm('記録を削除しますか？'))return;remove(ref(db,'records/r'+id));closeOvDirect();showToast('削除しました');};

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
window.showToast=showToast;
</script>
</body>
</html>
